name: Agent Eval (on change)
# Disabled — eval triggered by post-commit hook on ethics-gradient (clavain-eval-on-change.service)
on:
  workflow_dispatch: {}

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run eval harness (T4 fast check)
        run: python3 galiana/eval.py --topologies T4 --no-interbench

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-results
          path: ~/.clavain/eval-results.jsonl
