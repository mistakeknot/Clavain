# Tool composition layer — shallow metadata for agent tool routing
# Mirrors interchart's domain overlay pattern applied to tool selection
# See: dialectics/2026-03-02-plugin-modularity/r3_sublation.md
#
# Go-only parser (clavain-cli tool-surface). No bash-side parser exists.
# curation_groups omit boost/weight intentionally — context injection, not graph scoring.
# TODO: Add tool-composition.schema.json when format stabilizes.
#
# Consolidation Criteria (evaluate when adding hints):
# 1. Hint exceeds 120-char limit → boundary may need facade or merge
# 2. >3 hints between same plugin pair → too much coordination surface
# 3. Persistent failure rate despite hints (check interstat data)
# 4. Tool descriptions need cross-references to explain interaction
# As of 2026-03-05: no plugin pair meets these criteria.

version: 1

domains:
  coordination:
    description: "Multi-agent coordination, file locking, message passing"
    plugins: [interlock, intermux, intercom]
  analytics:
    description: "Token tracking, cost analysis, benchmarking"
    plugins: [interstat, tool-time, interbench]
  quality:
    description: "Code review, quality gates, verification"
    plugins: [interflux, intercheck]
  docs:
    description: "Documentation lifecycle, drift detection, artifact generation"
    plugins: [interwatch, interdoc, interpath, interkasten]
  discovery:
    description: "Code search, semantic retrieval, context extraction"
    plugins: [intersearch, tldr-swinton, intermap, interject]
  phase-control:
    description: "Sprint lifecycle, phase gates, bead tracking"
    plugins: [interphase, clavain]
  design:
    description: "Visual design, UI components, theming"
    plugins: [interform, interchart]
  research:
    description: "Cross-AI peer review, external web search"
    plugins: [interpeer]

curation_groups:
  sprint-core:
    plugins: [clavain, interphase, interflux, interstat]
    context: "Sprint lifecycle — clavain orchestrates, interphase gates, interflux reviews, interstat measures"
  coordination-stack:
    plugins: [interlock, intermux, interpath]
    context: "Multi-agent file coordination — resolve paths, reserve files, monitor agents"
  doc-lifecycle:
    plugins: [interwatch, interdoc, interpath, interkasten]
    context: "Document maintenance — detect drift, generate artifacts, manage AGENTS.md, sync Notion"
  discovery-stack:
    plugins: [intersearch, tldr-swinton, intermap, interject]
    context: "Code investigation — semantic search, file extraction, codebase mapping, inbox triage"

sequencing_hints:
  - first: interpath
    then: interlock
    hint: "Resolve file paths before reserving them for editing"
  - first: interflux
    then: clavain
    hint: "flux-drive review runs on plan files before sprint execution"
  - first: interstat
    then: clavain
    hint: "set-bead-context registers token attribution before sprint work"
  - first: interflux
    then: intersynth
    hint: "review agents must complete before synthesis agent runs"
  - first: intersynth
    then: interspect
    hint: "synthesize verdicts before recording evidence"
  - first: interspect
    then: clavain
    hint: "interspect evidence calibrates agent routing after reflect"
  - first: interphase
    then: clavain
    hint: "read interphase sprint state before route dispatch decision"

disambiguation_hints:
  - plugins: [interpath, interdoc]
    domain: docs
    hint: "interpath generates artifacts (roadmaps, changelogs); interdoc manages AGENTS.md"
  - plugins: [interwatch, intercheck]
    domain: quality
    hint: "interwatch detects doc drift; intercheck runs code quality verification"
  - plugins: [intersearch, tldr-swinton]
    domain: discovery
    hint: "intersearch queries cached embeddings; tldr-swinton extracts live file structure"
  - plugins: [interlock, intermux]
    domain: coordination
    hint: "interlock reserves files for editing; intermux monitors active agent sessions"
  - plugins: [interflux, interpeer]
    domain: quality
    hint: "interflux uses Claude-native fd-* agents; interpeer uses cross-AI review"
  - plugins: [interject, intersearch]
    domain: discovery
    hint: "interject does ambient inbox triage; intersearch does explicit code queries"
  - plugins: [interwatch, interkasten]
    domain: docs
    hint: "interwatch detects local doc staleness; interkasten syncs with Notion"
