# Clavain Handoff Contracts — Per-Artifact Content Validation
# Defines what each artifact type must contain for cross-phase handoffs.
# Used by: clavain-cli validate-handoff, enforce-gate (artifact_contract gate type)
#
# Override: place .clavain/handoff-contracts.yaml in project root for per-project customization.
# Merge semantics: contracts merge by type key, arrays replace.

version: "1.0"

contracts:
  brainstorm:
    description: "Problem exploration with research and proposed approaches"
    produced_by: discover
    consumed_by: [design]
    frontmatter:
      required_fields: [artifact_type, bead, stage]
    content:
      required_sections:
        - id: problem_statement
          heading_pattern: "(?i)problem|problem.statement"
          min_words: 50
        - id: research
          heading_pattern: "(?i)research|analysis|current.state"
        - id: approaches
          heading_pattern: "(?i)approach|proposed|options|design"
      optional_sections:
        - id: tradeoffs
          heading_pattern: "(?i)tradeoff|trade.off|comparison"
        - id: open_questions
          heading_pattern: "(?i)open.question|tbd|unresolved"
      min_total_words: 200

  prd:
    description: "Product requirements with features and acceptance criteria"
    produced_by: design
    consumed_by: [design, build]
    frontmatter:
      required_fields: [artifact_type, bead, stage]
    content:
      required_sections:
        - id: summary
          heading_pattern: "(?i)summary|overview|goal|problem"
        - id: features
          heading_pattern: "(?i)feature|requirement|scope"
        - id: acceptance_criteria
          heading_pattern: "(?i)acceptance|criteria|done.when|definition.of.done"
      optional_sections:
        - id: non_goals
          heading_pattern: "(?i)non.?goal|out.of.scope|excluded"
      min_total_words: 300

  plan:
    description: "Implementation plan with tasks and file targets"
    produced_by: design
    consumed_by: [build]
    frontmatter:
      required_fields: [artifact_type, bead, stage]
    content:
      required_sections:
        - id: tasks
          heading_pattern: "(?i)task.\\d|step.\\d|phase.\\d"
          min_count: 1
      optional_sections:
        - id: prior_learnings
          heading_pattern: "(?i)prior.learn|learnings|context"
      required_patterns:
        - pattern: "[A-Za-z_/.-]+\\.[a-z]{1,4}"
          description: "Must reference at least one file path"

  verdict:
    description: "Review verdict from quality gates"
    produced_by: build
    consumed_by: [ship]
    frontmatter:
      required_fields: []
    content:
      required_patterns:
        - pattern: "^TYPE:\\s+(verdict|implementation)"
          description: "Must have TYPE header"
        - pattern: "(?m)^STATUS:\\s+(CLEAN|NEEDS_ATTENTION|BLOCKED|ERROR|COMPLETE|PARTIAL|FAILED)"
          description: "Must have STATUS line"
      optional_patterns:
        - pattern: "^MODEL:"
        - pattern: "^TOKENS_SPENT:"

  cuj:
    description: "Critical User Journey with typed success signals"
    produced_by: design
    consumed_by: [build, ship]
    frontmatter:
      required_fields: [artifact_type, journey, actor]
    content:
      required_sections:
        - id: motivation
          heading_pattern: "(?i)why.this.journey|why.it.matters|motivation|stakes"
          min_words: 30
        - id: journey
          heading_pattern: "(?i)the.journey|journey|experience|flow"
          min_words: 50
        - id: success_signals
          heading_pattern: "(?i)success.signal|signal"
      optional_sections:
        - id: friction_points
          heading_pattern: "(?i)friction|pain.point|risk|known.issue"
      required_patterns:
        - pattern: "measurable|observable|qualitative"
          description: "Must include typed success signals"
      min_total_words: 150

  reflection:
    description: "Sprint learnings and retrospective"
    produced_by: reflect
    consumed_by: []
    frontmatter:
      required_fields: [artifact_type, bead]
    content:
      required_sections:
        - id: learnings
          heading_pattern: "(?i)learning|key.insight|what.learn"
      optional_sections:
        - id: went_well
          heading_pattern: "(?i)went.well|success|win"
        - id: improvements
          heading_pattern: "(?i)improve|next.time|could.better"
      min_total_words: 100
