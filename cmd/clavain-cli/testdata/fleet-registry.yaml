version: "1.0"
capability_vocabulary:
  - domain_review
  - multi_perspective
  - verdict_aggregation
agents:
  fd-safety:
    source: interflux
    category: review
    capabilities: [domain_review]
    roles: [fd-safety]
    runtime:
      mode: subagent
      subagent_type: "interflux:fd-safety"
    models:
      preferred: sonnet
      supported: [haiku, sonnet, opus]
    cold_start_tokens: 800
    tags: [technical]
  fd-architecture:
    source: interflux
    category: review
    capabilities: [domain_review, multi_perspective]
    roles: [fd-architecture]
