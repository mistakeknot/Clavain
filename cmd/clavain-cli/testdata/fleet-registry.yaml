    tags: [technical]
  fd-correctness:
    source: interflux
    category: review
    capabilities: [domain_review]
    roles: [fd-correctness]
    runtime:
      mode: subagent
      subagent_type: "interflux:fd-correctness"
    models:
      preferred: sonnet
      supported: [haiku, sonnet, opus]
    cold_start_tokens: 800
    tags: [technical]
  fd-quality:
    source: interflux
    category: review
    capabilities: [domain_review]
    roles: [fd-quality]
    runtime:
      mode: subagent
      subagent_type: "interflux:fd-quality"
    models:
      preferred: sonnet
      supported: [haiku, sonnet, opus]
